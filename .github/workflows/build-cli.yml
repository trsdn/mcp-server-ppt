name: Build CLI

permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/PptMcp.CLI/**'
      - 'src/PptMcp.Core/**'
      - 'src/PptMcp.ComInterop/**'
      - 'tests/PptMcp.CLI.Tests/**'
      - 'tests/PptMcp.Core.Tests/**'
      - 'tests/PptMcp.ComInterop.Tests/**'
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/build-cli.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/PptMcp.CLI/**'
      - 'src/PptMcp.Core/**'
      - 'src/PptMcp.ComInterop/**'
      - 'tests/PptMcp.CLI.Tests/**'
      - 'tests/PptMcp.Core.Tests/**'
      - 'tests/PptMcp.Diagnostics.Tests/**'
      - 'tests/PptMcp.ComInterop.Tests/**'
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/build-cli.yml'

jobs:
  build-cli:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore src/PptMcp.CLI/PptMcp.CLI.csproj

    - name: Build CLI
      run: dotnet build src/PptMcp.CLI/PptMcp.CLI.csproj --no-restore --configuration Release

    - name: Verify Core Commands Coverage
      run: |
        Write-Output "🔍 Verifying Core Commands coverage..."
        & scripts/audit-core-coverage.ps1 -FailOnGaps
        if ($LASTEXITCODE -ne 0) {
          Write-Error "❌ Coverage gaps detected! All Core methods must be exposed via MCP Server."
          exit 1
        }
        Write-Output "✅ Coverage audit passed - 100% coverage maintained"
      shell: pwsh

    - name: Verify CLI build
      run: |
        # Check pptcli main executable
        if (Test-Path "src/PptMcp.CLI/bin/Release/net9.0-windows/pptcli.exe") {
          Write-Output "✅ pptcli.exe built successfully"
          $version = (Get-Item "src/PptMcp.CLI/bin/Release/net9.0-windows/pptcli.exe").VersionInfo.FileVersion
          Write-Output "Version: $version"

          # Test CLI help command (safe - no PowerPoint COM required)
          $helpOutput = & "src/PptMcp.CLI/bin/Release/net9.0-windows/pptcli.exe" --help 2>&1
          $exitCode = $LASTEXITCODE

          if ($exitCode -eq 0) {
            Write-Output "✅ CLI help command working (exit code: 0)"
            Write-Output "📋 Help output preview:"
            $helpOutput | Select-Object -First 5 | ForEach-Object { Write-Output "  $_" }
          } else {
            Write-Error "❌ CLI help command failed with exit code: $exitCode"
            Write-Output "Full output:"
            $helpOutput | ForEach-Object { Write-Output "  $_" }
            exit 1
          }
        } else {
          Write-Error "❌ pptcli.exe not found"
          exit 1
        }

        Write-Output "🔧 CLI tool ready for direct automation"
      shell: pwsh

    - name: Test CLI (requires PowerPoint)
      run: |
        Write-Output "ℹ️ Note: CLI tests skipped in CI - they require Microsoft PowerPoint"
        Write-Output "   Run 'dotnet test tests/PptMcp.CLI.Tests/' locally with PowerPoint installed"
      shell: pwsh

    - name: Upload CLI build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PptMcp-CLI-${{ github.sha }}
        path: src/PptMcp.CLI/bin/Release/net9.0-windows/
