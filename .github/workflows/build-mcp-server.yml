name: Build MCP Server

permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/PptMcp.McpServer/**'
      - 'src/PptMcp.Core/**'
      - 'src/PptMcp.ComInterop/**'
      - 'tests/PptMcp.McpServer.Tests/**'
      - 'tests/PptMcp.Core.Tests/**'
      - 'tests/PptMcp.Diagnostics.Tests/**'
      - 'tests/PptMcp.ComInterop.Tests/**'
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/build-mcp-server.yml'

jobs:
  build-mcp-server:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/PptMcp.McpServer/PptMcp.McpServer.csproj

    - name: Build MCP Server
      run: dotnet build src/PptMcp.McpServer/PptMcp.McpServer.csproj --no-restore --configuration Release

    - name: Verify Core Commands Coverage
      run: |
        Write-Output "🔍 Verifying Core Commands coverage..."
        & scripts/audit-core-coverage.ps1 -FailOnGaps
        if ($LASTEXITCODE -ne 0) {
          Write-Error "❌ Coverage gaps detected! All Core methods must be exposed via MCP Server."
          exit 1
        }
        Write-Output "✅ Coverage audit passed - 100% coverage maintained"
      shell: pwsh

    - name: Verify MCP Server build
      run: |
        # Check MCP Server executable
        if (Test-Path "src/PptMcp.McpServer/bin/Release/net10.0-windows/PptMcp.McpServer.exe") {
          Write-Output "✅ PptMcp.McpServer.exe built successfully"
          $mcpVersion = (Get-Item "src/PptMcp.McpServer/bin/Release/net10.0-windows/PptMcp.McpServer.exe").VersionInfo.FileVersion
          Write-Output "📦 MCP Server Version: $mcpVersion"

          # Check for MCP server.json configuration
          if (Test-Path "src/PptMcp.McpServer/bin/Release/net10.0-windows/.mcp/server.json") {
            Write-Output "✅ MCP server.json configuration found"
          } else {
            Write-Warning "⚠️ MCP server.json configuration not found"
          }
        } else {
          Write-Error "❌ PptMcp.McpServer.exe not found"
          exit 1
        }

        Write-Output "🧠 MCP Server ready for AI assistant integration"
      shell: pwsh

    - name: Upload MCP Server build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PptMcp-MCP-Server-${{ github.sha }}
        path: src/PptMcp.McpServer/bin/Release/net10.0-windows/
